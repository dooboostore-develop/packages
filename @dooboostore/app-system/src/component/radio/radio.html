<label class="${@this@.getAttribute('class')}$">
  <input
    name="${@this@.getAttribute('name')}$"
    checked="${@this@.getAttribute('checked')}$"
    value="${@this@.getAttribute('value')}$"
    dr-on-init="@this@.onInitInputElement($element)"
    dr-event-change="@this@.change($element.checked);"
    type="radio"

  />
  ${@this@.getAttribute('checked')}$
  #innerHTML#
</label>
