<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce | DoobooStore</title>
  <script src="https://unpkg.com/@ungap/custom-elements"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Global styles for SWC components */
    commerce-header {
      display: block;
    }

    #page-container {
      flex: 1;
      overflow-y: auto;
    }

    /* Page transitions */
    commerce-home-page,
    commerce-product-page,
    commerce-cart-page,
    commerce-checkout-page,
    commerce-orders-page {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body id="app" is="swc-app-body">
  <commerce-root-router/>
  <script src="/bundle.js"></script>
</body>
</html>
