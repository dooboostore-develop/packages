    <h1>Attribute Design Test</h1>
    <p>Testing <code>@setAttribute</code> (method return to attribute) and <code>@changedAttribute</code> (handler for attribute changes).</p>

    <attr-element id="target" count="0"></attr-element>

    <div style="margin-top: 30px; padding: 15px; border: 1px dashed #ccc; border-radius: 8px">
      <h4>External Attribute Control</h4>
      <p>Clicking these will trigger <code>@changedAttribute</code> via <code>setAttribute()</code>:</p>
      <button onclick="document.getElementById('target').setAttribute('count', '99')" style="padding: 8px 16px">External: Set count=99</button>
      <button onclick="document.getElementById('target').toggleAttribute('active')" style="padding: 8px 16px">External: Toggle active</button>
    </div>
  </body>
