<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SwcChoose Test</title>
    <script src="https://unpkg.com/@ungap/custom-elements"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        line-height: 1.6;
      }
      .controls {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 15px;
      }
      .case-box {
        padding: 20px;
        border-radius: 8px;
        margin-top: 15px;
        color: white;
        font-weight: bold;
      }
      .admin {
        background: #d32f2f;
      }
      .user {
        background: #1976d2;
      }
      .guest {
        background: #388e3c;
      }
      .unknown {
        background: #757575;
      }
      button {
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: white;
      }
    </style>
  </head>
  <body>
    <script>
      var currentRole = 'guest';
    </script>
    <h1>SwcChoose: Switch-Case Template</h1>
    <p>Using <code>&lt;template is="swc-choose"&gt;</code> to render specific blocks based on values.</p>

    <div class="controls">
      <button onclick="window.currentRole = 'admin'; document.getElementById('role-choose').setAttribute('on-get-value', 'currentRole')">Set Admin</button>
      <button onclick="window.currentRole = 'user'; document.getElementById('role-choose').setAttribute('on-get-value', 'currentRole')">Set User</button>
      <button onclick="window.currentRole = 'guest'; document.getElementById('role-choose').setAttribute('on-get-value', 'currentRole')">Set Guest</button>
      <button onclick="window.currentRole = 'hacker'; document.getElementById('role-choose').setAttribute('on-get-value', 'currentRole')">Set Unknown</button>
      <button onclick="window.currentRole = null; document.getElementById('role-choose').removeAttribute('on-get-value')">Clear Value</button>
    </div>

    <div style="border: 2px dashed #aaa; padding: 20px">
      <template is="swc-choose" id="role-choose" on-get-value="currentRole" on-clone-node="if($isElement && $node.querySelector('.val')) $node.querySelector('.val').textContent = $value">
        <template is="swc-default">
          <div class="case-box" style="background: #9e9e9e">SYSTEM: PLEASE SELECT A ROLE TO PROCEED</div>
        </template>

        <template is="swc-when" value="admin">
          <div class="case-box admin">ACCESS GRANTED: ADMIN PANEL</div>
        </template>

        <template is="swc-when" value="user">
          <div class="case-box user">WELCOME BACK: USER DASHBOARD</div>
        </template>

        <template is="swc-when" value="guest">
          <div class="case-box guest">HELLO GUEST: PLEASE LOG IN</div>
        </template>

        <template is="swc-otherwise">
          <div class="case-box unknown">ACCESS DENIED: UNKNOWN ROLE [<span class="val"></span>]</div>
        </template>
      </template>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
