<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lifecycle Test Case</title>
    <script src="https://unpkg.com/@ungap/custom-elements"></script>
  </head>
  <body>
    <h1>Lifecycle Test</h1>
    <div id="container">
      <lifecycle-element id="target"></lifecycle-element>
    </div>
    <button id="remove-btn">Remove Element</button>
    <button id="add-btn">Add Element</button>

    <script>
      document.getElementById('remove-btn').onclick = () => {
        document.getElementById('target')?.remove();
      };
      document.getElementById('add-btn').onclick = () => {
        if (!document.getElementById('target')) {
          const el = document.createElement('lifecycle-element');
          el.id = 'target';
          document.getElementById('container').appendChild(el);
        }
      };
    </script>
  </body>
</html>
