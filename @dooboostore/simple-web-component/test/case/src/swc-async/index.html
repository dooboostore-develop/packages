<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SwcAsync Test</title>
    <script src="https://unpkg.com/@ungap/custom-elements"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        line-height: 1.6;
      }
      .controls {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
      }
      .box {
        padding: 20px;
        border-radius: 8px;
        margin-top: 15px;
        border: 2px solid #ccc;
      }
      .loading {
        background: #fffde7;
        border-color: #fbc02d;
        color: #f57f17;
        font-weight: bold;
      }
      .error {
        background: #ffebee;
        border-color: #ef5350;
        color: #c62828;
      }
      .success {
        background: #e8f5e9;
        border-color: #4caf50;
        color: #2e7d32;
      }
      button {
        padding: 8px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <script>
      window.fetchData = () => {
        console.log('>>> [Global Script] fetchData called (Initial)');
        return new Promise(resolve => {
          setTimeout(() => {
            resolve({ id: 0, title: 'Initial Data', timestamp: new Date().toISOString() });
          }, 1500);
        });
      };
    </script>
    <h1>SwcAsync: Declarative Promises</h1>
    <p>Using <code>&lt;template is="swc-async"&gt;</code> to handle async states (loading, error, success).</p>

    <div class="controls">
      <button id="success-btn">Fetch Success (2s)</button>
      <button id="error-btn">Fetch Error (2s)</button>
      <button onclick="document.getElementById('my-async').removeAttribute('on-get-value')">Remove Attr (Default State)</button>
    </div>

    <div style="padding: 20px; border: 1px dashed #aaa">
      <template
        is="swc-async"
        id="my-async"
        on-get-value="window.fetchData()"
        on-clone-node="
            if($isElement && $node.querySelector('.content')) {
               $node.querySelector('.content').textContent = JSON.stringify($value || $error || '');
            }
          "
      >
        <!-- 0. Default State -->
        <template is="swc-default">
          <div class="box" style="background: #f5f5f5">⏹ IDLE: No request active.</div>
        </template>

        <!-- 1. Loading State -->
        <template is="swc-loading">
          <div class="box loading">🌀 Loading data from server...</div>
        </template>

        <!-- 2. Error State -->
        <template is="swc-error">
          <div class="box error">❌ Error occurred: <span class="content"></span></div>
        </template>

        <!-- 3. Success State (Explicit) -->
        <template is="swc-success">
          <div class="box success">
            ✅ Data Loaded Successfully!
            <pre class="content" style="background: rgba(0, 0, 0, 0.05); padding: 10px; margin-top: 10px"></pre>
          </div>
        </template>
      </template>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
