<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>SwcIf Test</title>
  <script src="https://unpkg.com/@ungap/custom-elements"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      line-height: 1.6;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
      align-items: center;
    }

    .box {
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .visible {
      background: #e8f5e9;
      border: 2px solid #4caf50;
    }

    .independent {
      background: #fff3e0;
      border: 2px solid #ff9800;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>
<body id="app" is="swc-app-body">
<app-router/>
</body>
</html>
