<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Surgical Attribute Test</title>
    <script src="https://unpkg.com/@ungap/custom-elements"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        line-height: 1.6;
      }
      nav {
        background: #eee;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      nav a {
        color: #1a73e8;
        text-decoration: none;
        font-weight: bold;
      }
      .surgical-box {
        border: 2px solid #9c27b0;
        padding: 20px;
        border-radius: 10px;
        background: #f3e5f5;
      }
      .child-box {
        border: 1px solid #7b1fa2;
        padding: 15px;
        background: white;
        margin-top: 15px;
        border-radius: 8px;
      }
      .status-tag {
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 0.9em;
        font-weight: bold;
        background: #eee;
        border: 1px solid #ccc;
      }

      /* CSS styling based on attribute value */
      #status-display[data-status='active'] {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #4caf50;
      }
      #status-display[data-status='inactive'] {
        background: #ffebee;
        color: #c62828;
        border: 1px solid #ef5350;
      }

      button {
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: white;
        margin-right: 5px;
      }
      button:hover {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <nav>
      <strong>Test Cases:</strong>
      <a href="../index.html">Main Hub</a> |
      <a href="../attr/index.html">Basic Attributes</a>
    </nav>

    <h1>Surgical Attribute Injection</h1>
    <p>Using <code>@setAttribute(selector, name)</code> to update child or host attributes directly without re-rendering.</p>

    <attr-surgical-element id="test-el"></attr-surgical-element>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
